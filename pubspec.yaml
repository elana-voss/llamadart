name: llamadart
description: Dart and Flutter local LLM inference with llama.cpp GGUF and LiteRT-LM across native platforms and web.
version: 0.7.0
homepage: https://github.com/leehack/llamadart
repository: https://github.com/leehack/llamadart
issue_tracker: https://github.com/leehack/llamadart/issues
topics:
  - llama
  - llm
  - inference
  - gguf
  - litert

environment:
  sdk: ^3.10.7
  flutter: ">=3.38.0"

dependencies:
  archive: ^4.0.7
  ffi: ^2.1.0
  path: ^1.8.3
  http: ^1.1.0
  crypto: ^3.0.0
  web: ^1.0.0
  code_assets: ^1.0.0
  hooks: ^1.0.0
  logging: ^1.3.0
  dinja: ^1.0.0

dev_dependencies:
  ffigen: ^20.1.1
  lints: ^6.1.0
  test: ^1.26.3

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: LlamadartPlugin
        sharedDarwinSource: true
      macos:
        pluginClass: LlamadartPlugin
        sharedDarwinSource: true
