name: Sync Native Version & Bindings

on:
  workflow_dispatch:
    inputs:
      native_tag:
        description: 'llamadart-native release tag to sync (e.g., b8011 or latest)'
        required: true
        default: 'latest'
      litert_lm_tag:
        description: 'litert-lm-native release tag to sync (e.g., v0.13.1, latest, or keep)'
        required: true
        default: 'keep'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache Pub packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-cache-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-cache-

      - name: Install LLVM/Clang for ffigen
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-dev libclang-dev clang rsync python3

      - name: Install Dart/Flutter dependencies
        run: flutter pub get

      - name: Sync headers and regenerate bindings
        id: sync_headers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tool/native/sync_native_headers_and_bindings.sh --tag "${{ github.event.inputs.native_tag }}"

      - name: Sync native hook pins
        id: sync_pins
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 tool/native/sync_native_release_pins.py \
            --llama-cpp-tag "${{ steps.sync_headers.outputs.resolved_tag }}" \
            --litert-lm-tag "${{ github.event.inputs.litert_lm_tag }}"

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(native): sync native release ${{ steps.sync_headers.outputs.resolved_tag }}"
          title: "chore(native): sync native release ${{ steps.sync_headers.outputs.resolved_tag }}"
          body: |
            Automated sync from `leehack/llamadart-native` release `${{ steps.sync_headers.outputs.resolved_tag }}`.

            Changes:
            - Updates `hook/build.dart` native release pins.
            - Syncs headers from the matching `llamadart-native` release header bundle.
            - Regenerates `lib/src/backends/llama_cpp/bindings.dart` via ffigen.
            - Updates LiteRT-LM runtime archive checksums when `litert_lm_tag` is not `keep`.
            - Updates Apple SPM companion `Package.swift` binary target pins in `packages/`.
            - Bumps companion package patch versions and updates their README/CHANGELOG native pin notes when SPM pins change.

            Native version checklist:
            - [ ] Confirm `leehack/llamadart-native` release `${{ steps.sync_headers.outputs.resolved_tag }}` includes the required native-assets archives.
            - [ ] If `${{ github.event.inputs.litert_lm_tag }}` is not `keep`, confirm `leehack/litert-lm-native` release `${{ steps.sync_pins.outputs.resolved_litert_lm_tag }}` includes the required runtime archives.
            - [ ] Confirm matching Apple SPM pins changed under `packages/` when Apple XCFramework releases changed.
          branch: "automation/native-sync-${{ steps.sync_headers.outputs.resolved_tag }}"
          labels: automation/native-sync
          add-paths: |
            hook/build.dart
            packages/llamadart_llama_cpp_flutter/darwin/llamadart_llama_cpp_flutter/Package.swift
            packages/llamadart_llama_cpp_flutter/pubspec.yaml
            packages/llamadart_llama_cpp_flutter/CHANGELOG.md
            packages/llamadart_llama_cpp_flutter/README.md
            packages/llamadart_litert_lm_flutter/darwin/llamadart_litert_lm_flutter/Package.swift
            packages/llamadart_litert_lm_flutter/pubspec.yaml
            packages/llamadart_litert_lm_flutter/CHANGELOG.md
            packages/llamadart_litert_lm_flutter/README.md
            lib/src/backends/llama_cpp/bindings.dart
          delete-branch: true
